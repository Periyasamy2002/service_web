<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth - Service Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Animated Gradient Background */
        .bg-gradient-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Container */
        .auth-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Slide Container */
        .auth-slide-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: auto;
            perspective: 1000px;
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 50px 45px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            position: absolute;
            width: 100%;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 1;
            transform: translateX(0) rotateY(0deg);
        }

        .glass-card.hidden {
            opacity: 0;
            transform: translateX(500px) rotateY(45deg);
            pointer-events: none;
        }

        .glass-card.hidden-left {
            opacity: 0;
            transform: translateX(-500px) rotateY(-45deg);
            pointer-events: none;
        }

        /* Header */
        .auth-header {
            text-align: center;
            margin-bottom: 35px;
            animation: fadeInDown 0.8s ease-out;
        }

        .auth-header h1 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Group */
        .form-group {
            position: relative;
            margin-bottom: 22px;
        }

        .floating-label {
            position: absolute;
            left: 15px;
            top: 18px;
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 16px 15px 10px 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-input::placeholder {
            color: transparent;
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2),
                        inset 0 0 10px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .form-input:not(:placeholder-shown) ~ .floating-label,
        .form-input:focus ~ .floating-label {
            top: 5px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.95);
        }

        /* Error State */
        .form-input.error {
            border-color: #ff6b6b;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: rgba(255, 255, 255, 0.6);
        }

        .checkbox-group label {
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.8), rgba(253, 121, 168, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, rgba(255, 107, 107, 1), rgba(253, 121, 168, 1));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(253, 121, 168, 0.4);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        /* Toggle Button */
        .btn-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 1);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0;
        }

        .btn-toggle:hover {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: underline;
        }

        /* Social Buttons */
        .social-container {
            margin: 30px 0;
        }

        .social-label {
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 15px;
            position: relative;
        }

        .social-label::before,
        .social-label::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .social-label::before { left: 0; }
        .social-label::after { right: 0; }

        .social-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }

        .social-btn:nth-child(1):hover {
            background: rgba(66, 133, 244, 0.3);
            border-color: rgba(66, 133, 244, 0.6);
        }

        .social-btn:nth-child(2):hover {
            background: rgba(59, 89, 152, 0.3);
            border-color: rgba(59, 89, 152, 0.6);
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 25px;
        }

        .auth-footer p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: rgba(255, 255, 255, 1);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength.active {
            display: block;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(to right, #ff6b6b, #ffd93d, #6bcf7f);
            animation: grow 0.3s ease-out;
        }

        @keyframes grow {
            from { width: 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 35px 20px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .form-input {
                font-size: 16px;
            }

            .social-btn {
                width: 45px;
                height: 45px;
            }
        }

        /* Loading State */
        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-gradient-animated"></div>

    <!-- Auth Wrapper -->
    <div class="auth-wrapper">
        <div class="auth-slide-container">

            <!-- LOGIN FORM -->
            <div class="glass-card login-card" id="loginCard">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to access your dashboard</p>
                </div>

                <form id="loginForm" method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <input type="text" name="username" id="loginUsername" class="form-input" placeholder="Username" required>
                        <label class="floating-label" for="loginUsername">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <div class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <input type="password" name="password" id="loginPassword" class="form-input" placeholder="Password" required>
                        <label class="floating-label" for="loginPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="error-message"></div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberLogin" name="remember">
                        <label for="rememberLogin">Remember me</label>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="social-container">
                    <div class="social-label">Or continue with</div>
                    <div class="social-buttons">
                        <button type="button" class="social-btn" title="Google" onclick="handleSocialLogin(event, 'google')">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="social-btn" title="Facebook" onclick="handleSocialLogin(event, 'facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Don't have an account? <button type="button" class="btn-toggle" onclick="togglePanel()">Sign up</button></p>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div class="glass-card register-card hidden-left" id="registerCard">
                <div class="auth-header">
                    <h1>Create Account</h1>
                    <p>Join us and get started today</p>
                </div>

                <form id="registerForm" method="post" action="{% url 'register' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <input type="text" name="username" id="regUsername" class="form-input" placeholder="Username" required>
                        <label class="floating-label" for="regUsername">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <div class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <input type="email" name="email" id="regEmail" class="form-input" placeholder="Email address" required>
                        <label class="floating-label" for="regEmail">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <div class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <input type="password" name="password1" id="regPassword" class="form-input" placeholder="Password" required>
                        <label class="floating-label" for="regPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="password-strength"><div class="password-strength-bar"></div></div>
                        <div class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <input type="password" name="password2" id="regConfirm" class="form-input" placeholder="Confirm Password" required>
                        <label class="floating-label" for="regConfirm">
                            <i class="fas fa-lock-open"></i> Confirm Password
                        </label>
                        <div class="error-message"></div>
                    </div>

                    <div class="checkbox-group" style="align-items: flex-start;">
                        <input type="checkbox" id="termsCheckbox" name="terms" required>
                        <label for="termsCheckbox">I agree to the Terms & Conditions and Privacy Policy</label>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="social-container">
                    <div class="social-label">Or sign up with</div>
                    <div class="social-buttons">
                        <button type="button" class="social-btn" title="Google" onclick="handleSocialLogin(event, 'google')">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="social-btn" title="Facebook" onclick="handleSocialLogin(event, 'facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Already have an account? <button type="button" class="btn-toggle" onclick="togglePanel()">Sign in</button></p>
                </div>
            </div>

        </div>
    </div>

    <script>
        let isLoginMode = true;

        // Toggle between Login and Register
        function togglePanel() {
            const loginCard = document.getElementById('loginCard');
            const registerCard = document.getElementById('registerCard');

            if (isLoginMode) {
                // Switch to Register
                loginCard.classList.add('hidden');
                registerCard.classList.remove('hidden-left');
                registerCard.classList.remove('hidden');
            } else {
                // Switch to Login
                registerCard.classList.add('hidden-left');
                loginCard.classList.remove('hidden');
            }

            isLoginMode = !isLoginMode;
        }

        // Form Input Interactions
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Password Strength Indicator
        document.getElementById('regPassword')?.addEventListener('input', function() {
            const strength = calculatePasswordStrength(this.value);
            const indicator = this.parentElement.querySelector('.password-strength');
            const bar = indicator.querySelector('.password-strength-bar');

            if (this.value.length > 0) {
                indicator.classList.add('active');
                bar.style.width = strength + '%';
            } else {
                indicator.classList.remove('active');
            }
        });

        function calculatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength += 25;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 25;
            return Math.min(strength, 100);
        }

        // Login Form Validation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (validateLoginForm()) {
                const btn = this.querySelector('.btn-submit');
                btn.classList.add('loading');
                setTimeout(() => this.submit(), 800);
            }
        });

        function validateLoginForm() {
            const username = document.getElementById('loginUsername');
            const password = document.getElementById('loginPassword');
            let isValid = true;

            [username, password].forEach(input => {
                input.classList.remove('error');
                input.parentElement.querySelector('.error-message').textContent = '';
            });

            if (username.value.trim().length < 3) {
                showError(username, 'Username must be at least 3 characters');
                isValid = false;
            }

            if (password.value.length < 6) {
                showError(password, 'Password must be at least 6 characters');
                isValid = false;
            }

            return isValid;
        }

        // Register Form Validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (validateRegisterForm()) {
                const btn = this.querySelector('.btn-submit');
                btn.classList.add('loading');
                setTimeout(() => this.submit(), 800);
            }
        });

        function validateRegisterForm() {
            const username = document.getElementById('regUsername');
            const email = document.getElementById('regEmail');
            const password1 = document.getElementById('regPassword');
            const password2 = document.getElementById('regConfirm');
            const terms = document.getElementById('termsCheckbox');
            let isValid = true;

            [username, email, password1, password2].forEach(input => {
                input.classList.remove('error');
                input.parentElement.querySelector('.error-message').textContent = '';
            });

            if (username.value.trim().length < 3) {
                showError(username, 'Username must be at least 3 characters');
                isValid = false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                showError(email, 'Please enter a valid email address');
                isValid = false;
            }

            if (password1.value !== password2.value) {
                showError(password2, 'Passwords do not match');
                isValid = false;
            }

            if (password1.value.length < 8) {
                showError(password1, 'Password must be at least 8 characters');
                isValid = false;
            }

            if (!terms.checked) {
                alert('Please accept the terms and conditions');
                isValid = false;
            }

            return isValid;
        }

        function showError(input, message) {
            input.classList.add('error');
            input.parentElement.querySelector('.error-message').textContent = message;
        }

        // Social Login Handler
        function handleSocialLogin(e, provider) {
            e.preventDefault();
            console.log(`Attempting ${provider} login`);
            alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} authentication will be implemented soon!`);
        }
    </script>
</body>
</html>
