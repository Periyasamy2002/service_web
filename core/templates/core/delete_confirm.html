{% extends 'core/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card fade-in border-danger mt-5">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger"></i>
                    <h4 class="mt-3 text-dark">Confirm Deletion</h4>
                </div>
                <p class="text-muted text-center">
                    <i class="fas fa-info-circle"></i> 
                    Are you sure you want to delete <strong>{{ item_name }}</strong>? This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger bounce-in">
                            <i class="fas fa-check-circle"></i> Yes, Delete
                        </button>
                        <a class="btn btn-secondary" href="{% url 'dashboard' %}">
                            <i class="fas fa-times-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
