{% extends 'core/base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card fade-in">
            <div class="card-body">
                <div class="mb-4">
                    <h4 class="card-title">
                        <i class="fas fa-user-edit icon-blue"></i> Edit User Profile
                    </h4>
                    <p class="text-muted small"><i class="fas fa-info-circle"></i> Update user information and role</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 zoom-in" style="animation-delay: 0.1s;">
                        <label class="form-label"><i class="fas fa-user icon-blue"></i> Username</label>
                        <input class="form-control" value="{{ user_obj.username }}" disabled style="cursor: not-allowed;">
                    </div>
                    <div class="mb-3 zoom-in" style="animation-delay: 0.2s;">
                        <label class="form-label"><i class="fas fa-envelope icon-blue"></i> Email</label>
                        <input name="email" class="form-control" value="{{ user_obj.email }}">
                    </div>
                    <div class="mb-3 zoom-in" style="animation-delay: 0.3s;">
                        <label class="form-label"><i class="fas fa-id-card icon-blue"></i> First Name</label>
                        <input name="first_name" class="form-control" value="{{ user_obj.first_name }}">
                    </div>
                    <div class="mb-3 zoom-in" style="animation-delay: 0.4s;">
                        <label class="form-label"><i class="fas fa-id-card icon-blue"></i> Last Name</label>
                        <input name="last_name" class="form-control" value="{{ user_obj.last_name }}">
                    </div>
                    <div class="mb-4 zoom-in" style="animation-delay: 0.5s;">
                        <label class="form-label"><i class="fas fa-briefcase icon-blue"></i> Role</label>
                        <select name="role" class="form-select">
                            <option value="admin" {% if user_obj.profile.role == 'admin' %}selected{% endif %}>
                                <i class="fas fa-crown"></i> Admin
                            </option>
                            <option value="agent" {% if user_obj.profile.role == 'agent' %}selected{% endif %}>
                                <i class="fas fa-user-tie"></i> Agent
                            </option>
                            <option value="user" {% if user_obj.profile.role == 'user' %}selected{% endif %}>
                                <i class="fas fa-user"></i> User
                            </option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary bounce-in" type="submit">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a href="{% url 'user_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
